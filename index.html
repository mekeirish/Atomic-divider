<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Atomic Divider Ultimate - STABLE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; padding: 10px; margin: 0; }
        .container { max-width: 100%; margin: auto; }
        textarea { width: 100%; height: 80px; background: #1e1e1e; color: #00ff00; border: 1px solid #ff9800; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 11px; box-sizing: border-box; }
        button { background: #ff9800; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; border-radius: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; width: 100%; }
        .card { background: #222; padding: 8px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #333; }
        .copy-btn { background: #444; color: white; border: none; padding: 2px 6px; cursor: pointer; float: right; font-size: 9px; }
        
        .toggle-box { background: #333; padding: 10px; border-radius: 5px; margin: 10px 0; text-align: center; font-weight: bold; }
        
        .comparison-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .phone-mockup { width: 375px; height: 600px; background: white; border: 6px solid #333; border-radius: 30px; overflow: hidden; position: relative; }
        .phone-mockup iframe { width: 100%; height: 100%; border: none; }
    </style>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#4b6cb7"><link rel="apple-touch-icon" href="icon.png"></head>
<body>

<div class="container">
    <h2>Atomic Divider Ultimate</h2>
    <div class="toggle-box">
        <label><input type="checkbox" id="minifyToggle"> ACTIVER LA MINIFICATION</label>
    </div>
    <textarea id="mainInput" placeholder="Collez votre code monolithe complet ici..."></textarea>
    <button onclick="processEverything()">SCAN, DIVISER & SÉPARER CSS</button>

    <div class="grid">
        <div class="card"><h3>1. Global.css</h3><button class="copy-btn" onclick="copy('outGlobalCSS')">Copier</button><textarea id="outGlobalCSS"></textarea></div>
        <div class="card"><h3>2. Specific.css</h3><button class="copy-btn" onclick="copy('outSpecificCSS')">Copier</button><textarea id="outSpecificCSS"></textarea></div>
        <div class="card"><h3>HTML Structure</h3><button class="copy-btn" onclick="copy('outHTML')">Copier</button><textarea id="outHTML"></textarea></div>
        <div class="card"><h3>JS Global</h3><button class="copy-btn" onclick="copy('outJS')">Copier</button><textarea id="outJS"></textarea></div>
    </div>

    <hr>
    <h3>Simulation de Comparaison Smartphone</h3>
    <button style="background: #00adb5; color: white;" onclick="simulateComparison()">COMPARER ORIGINAL VS FRAGMENTÉ</button>
    
    <div class="comparison-wrapper">
        <div class="phone-mockup">
            <h4 style="color:#000; text-align:center; margin:5px 0;">ORIGINAL</h4>
            <iframe id="frame-original"></iframe>
        </div>
        <div class="phone-mockup">
            <h4 style="color:#000; text-align:center; margin:5px 0;">FRAGMENTÉ</h4>
            <iframe id="frame-fragmented"></iframe>
        </div>
    </div>
</div>

<script>
    function copy(id) { document.getElementById(id).select(); document.execCommand('copy'); }

    function minifyCSS(css) { return css.replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').trim(); }
    function minifyHTML(html) { return html.replace(/<!--[\s\S]*?-->/g, '').trim(); }
    function minifyJS(js) { return js.replace(/\/\*[\s\S]*?\*\//g, '').trim(); }

    function processEverything() {
        const isMinified = document.getElementById('minifyToggle').checked;
        const raw = document.getElementById('mainInput').value;
        const parser = new DOMParser();
        const doc = parser.parseFromString(raw, 'text/html');

        let cssRaw = "";
        doc.querySelectorAll('style').forEach(s => { cssRaw += s.innerHTML + "\n"; s.remove(); });
        
        let js = "";
        doc.querySelectorAll('script').forEach(s => { if(!s.src) { js += s.innerHTML + "\n"; s.remove(); } });
        
        let htmlContent = doc.body.innerHTML.trim();

        document.getElementById('outJS').value = isMinified ? minifyJS(js) : js.trim();
        document.getElementById('outHTML').value = isMinified ? minifyHTML(htmlContent) : htmlContent;

        let elements = Array.from(doc.querySelectorAll('div[id], section, article, .card'));
        let classCount = {};
        elements.forEach(el => {
            (el.className || "").split(' ').forEach(c => { if(c) classCount[c] = (classCount[c] || 0) + 1; });
        });

        separateCSS(cssRaw, classCount, isMinified);
    }

    function separateCSS(css, classCount, isMinified) {
        const commonClasses = Object.keys(classCount).filter(cls => classCount[cls] > 1);
        let globalCSS = "";
        let specificCSS = "";
        const ruleRegex = /([^{}]+\{[^{}]+\})/g;
        const rules = css.match(ruleRegex) || [];
        
        rules.forEach(rule => {
            let isCommon = (rule.includes("body") || rule.includes("html") || rule.includes("*") || rule.includes("@"));
            if (!isCommon) {
                commonClasses.forEach(cls => {
                    const classRegex = new RegExp("\\." + cls + "(?![a-zA-Z0-9_-])");
                    if (classRegex.test(rule)) isCommon = true;
                });
            }
            if(isCommon) globalCSS += rule + "\n\n";
            else specificCSS += rule + "\n\n";
        });
        document.getElementById('outGlobalCSS').value = isMinified ? minifyCSS(globalCSS) : globalCSS.trim();
        document.getElementById('outSpecificCSS').value = isMinified ? minifyCSS(specificCSS) : specificCSS.trim();
    }

    function simulateComparison() {
        const originalRaw = document.getElementById('mainInput').value;
        const globalCSS = document.getElementById('outGlobalCSS').value;
        const specificCSS = document.getElementById('outSpecificCSS').value;
        const js = document.getElementById('outJS').value;

        if (!originalRaw) { alert("Veuillez coller le code !"); return; }

        const frameOrig = document.getElementById('frame-original');
        frameOrig.srcdoc = originalRaw;

        const frameFrag = document.getElementById('frame-fragmented');
        
        // Méthode de chargement direct pour préserver l'exécution JS
        frameFrag.srcdoc = "<html>" + originalRaw + "</html>";
        
        // On attend que l'iframe soit chargée avant d'injecter les changements
        frameFrag.onload = function() {
            const win = frameFrag.contentWindow;
            const doc = win.document;
            
            // 1. Supprimer anciens styles et scripts inline
            doc.querySelectorAll('style').forEach(s => s.remove());
            doc.querySelectorAll('script').forEach(s => { if(!s.src) s.remove(); });
            
            // 2. Injecter nouveaux CSS
            const style1 = doc.createElement('style'); style1.textContent = globalCSS;
            const style2 = doc.createElement('style'); style2.textContent = specificCSS;
            doc.head.appendChild(style1);
            doc.head.appendChild(style2);
            
            // 3. Injecter nouveau JS
            const script = doc.createElement('script');
            script.textContent = js;
            doc.body.appendChild(script);
        };
    }
</script>
<div id="update-banner" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#23272d; color:white; padding:15px; border-radius:12px; z-index:9999; text-align:center; border:1px solid #4b6cb7;">Une mise à jour est disponible ! <button onclick="onUpdateClick()" style="margin-left:10px; cursor:pointer; background:#4b6cb7; color:white; border:none; padding:5px 10px; border-radius:5px;">Installer</button></div><script>let newWorker;if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').then(reg=>{if(reg.waiting){newWorker=reg.waiting;document.getElementById('update-banner').style.display='block';}reg.addEventListener('updatefound',()=>{newWorker=reg.installing;newWorker.addEventListener('statechange',()=>{if(newWorker.state==='installed'&&navigator.serviceWorker.controller)document.getElementById('update-banner').style.display='block';});});});navigator.serviceWorker.addEventListener('controllerchange',()=>{window.location.reload();});}function onUpdateClick(){if(newWorker)newWorker.postMessage({type:'SKIP_WAITING'});}</script></body>
</html>
